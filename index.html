<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EW6 Hex Editor AI PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <h3>EW6 Hex Editor AI</h3>
                <span class="author">Created by Zynex & Gemini 2.5</span>
            </div>
            <div class="header-btns">
                <button class="lang-btn" onclick="dilDegistir()">TR / EN</button>
                <button class="new-chat-btn" style="background:#c62828" onclick="temizleChatGPT()">C</button>
            </div>
        </header>

        <section class="quick-converter">
            <input type="number" id="decInput" placeholder="Sayı / Dec..." oninput="decToHexConvert()">
            <div class="convert-results">
                <div>Hex: <strong id="hexResult">0000</strong></div>
                <div>Game: <strong id="gameHexResult" style="color:#ffcc00">00 00</strong></div>
            </div>
        </section>

        <main class="messages-container" id="chatBox">
            <div class="message ai-message" id="welcomeMsg">
                ✨ EW6 1804 & 1914 Modding Assistant aktif. Dosyanızı yükleyip hex dizilimlerini aratabilir veya ülke kodları hakkında sorularınızı yöneltebilirsiniz.
            </div>
        </main>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="input" placeholder="Bir şeyler sorun veya hex dizilimi girin..." onkeypress="if(event.key === 'Enter') aiAnalizEt()">
                <button class="gemini-send-btn" onclick="aiAnalizEt()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

        <div class="file-panel">
            <label for="fileInput" class="file-label" id="lblOpenFile">📂 Dosya Seç / Open File</label>
            <input type="file" id="fileInput">
            <button id="downloadBtn" style="display:none;" onclick="downloadModdedFile()">💾 İndir</button>
        </div>

        <div class="hex-viewer-container" id="hexViewer">
            <div id="hexPlaceholder" class="hex-empty-msg">Modlamaya başlamak için yukarıdan bir dosya seçiniz...</div>
            <div id="hexEditorGrid" class="hex-editor-grid" style="display:none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
