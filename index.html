<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EW6 Hex Editor AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <h3>EW6 Hex Editor AI</h3>
                <span class="author">Created by Zynex</span>
            </div>
            <div class="header-btns">
                <button class="lang-btn" onclick="dilDegistir()">🌐 TR/EN</button>
                <button class="new-chat-btn" onclick="temizleSohbet()">🔄</button>
            </div>
        </header>

        <div class="quick-converter">
            <input type="number" id="decInput" placeholder="Sayı / Dec..." oninput="decToHexConvert()">
            <div class="convert-results">
                <span id="lblHex">Hex: <strong id="hexResult">0000</strong></span>
                <span id="lblGame">Game: <strong id="gameHexResult">00 00</strong></span>
            </div>
        </div>

        <div class="messages-container" id="chatBox"></div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="input" onkeypress="if(event.key === 'Enter') aiAnalizEt()">
                <button class="gemini-send-btn" onclick="aiAnalizEt()">➔</button>
            </div>
        </div>

        <div class="file-panel">
            <label for="fileInput" class="file-label" id="lblOpenFile">📂 Dosya Seç / Open File</label>
            <input type="file" id="fileInput" accept=".bin,.sav,.dat,.*">
            <button id="downloadBtn" style="display:none;" onclick="downloadModdedFile()">💾 İndir / Download</button>
        </div>

        <div class="hex-viewer-container">
            <div id="hexPlaceholder" class="hex-empty-msg"></div>
            <div id="hexEditorGrid" class="hex-editor-grid" style="display: none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
