<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EW6 Hex Editor AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="title-section">
                <h1>EW6 Assistant AI</h1>
                <p>Zynex & Gemini Engine v2.5</p>
            </div>
            <div class="control-buttons">
                <button id="langBtn" onclick="dilDegistir()">TR / EN</button>
                <button id="clearBtn" onclick="temizleSohbet()">C</button>
            </div>
        </div>

        <div class="converter-box">
            <input type="number" id="decInput" placeholder="Sayı / Dec..." oninput="decToHexConvert()">
            <div class="converter-results">
                <div>Hex: <strong id="hexResult">0000</strong></div>
                <div>Game: <strong id="gameHexResult">00 00</strong></div>
            </div>
        </div>

        <div class="chat-container">
            <div id="chatBox" class="chat-box"></div>
            <div class="input-area">
                <input type="text" id="input" onkeydown="if(event.key === 'Enter') aiAnalizEt()">
                <button onclick="aiAnalizEt()">➔</button>
            </div>
        </div>

        <div class="file-section">
            <label for="fileInput" id="lblOpenFile" class="file-label">📂 Dosya Seç / Open File</label>
            <input type="file" id="fileInput" style="display: none;">
            
            <div id="hexPlaceholder" class="hex-placeholder"></div>
            <div id="hexEditorGrid" class="hex-grid" style="display: none;"></div>
            
            <button id="downloadBtn" class="download-btn" onclick="downloadModdedFile()" style="display: none;">💾 Download File</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
