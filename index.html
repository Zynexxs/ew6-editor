<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EW6 Hex Editor AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <h3>EW6 Hex Editor AI</h3>
                <span class="author">Created by Zynex</span>
            </div>
            <div class="header-btns">
                <button class="search-toggle-btn" onclick="toggleSearchInput()">🔍</button>
                <button class="lang-btn" onclick="dilDegistir()">🌐 TR/EN</button>
                <button class="new-chat-btn" onclick="temizleSohbet()">🔄</button>
            </div>
        </header>

        <div id="quickSearchBar" class="quick-search-bar" style="display: none;">
            <input type="text" id="quickSearchInput" placeholder="Hex Ara (Örn: FF01FF)..." onkeypress="if(event.key === 'Enter') hizliHexAra()">
            <button onclick="hizliHexAra()">Bul</button>
        </div>

        <div class="quick-converter">
            <input type="number" id="decInput" placeholder="Sayı / Dec..." oninput="decToHexConvert()">
            <div class="convert-results">
                <span id="lblHex">Hex: <strong id="hexResult">0000</strong></span>
                <span id="lblGame">Game: <strong id="gameHexResult">00 00</strong></span>
            </div>
        </div>

        <div class="messages-container" id="chatBox"></div>

        <div class="input-wrapper">
            <div class="input-container">
                <input type="text" id="input" placeholder="Hex dizilimi girin veya Yapay Zekaya bir şey sorun..." onkeypress="if(event.key === 'Enter') aiAnalizEt()">
                <button class="gemini-send-btn" onclick="aiAnalizEt()">➔</button>
            </div>
        </div>

        <div class="file-panel">
            <label for="fileInput" class="file-label" id="lblOpenFile">📂 Dosya Seç / Open File</label>
            <input type="file" id="fileInput" accept=".bin,.sav,.dat,.btl,.*">
            <button id="downloadBtn" style="display:none;" onclick="downloadModdedFile()">💾 Dosyayı Kaydet</button>
        </div>

        <div class="manual-menu-panel" id="manualMenu" style="display: none;">
            <div class="menu-header-row">
                <div class="menu-title">🛠️ Byte Düzenleme Menüsü</div>
                <button id="multiSelectToggle" class="multi-toggle-btn" onclick="toggleMultiSelectMode()">🔗 Çoklu Seçim: KAPALI</button>
            </div>
            <div class="menu-info" id="editMenuInfo">Düzenlemek için aşağıdan byte seçin.</div>
            <div class="menu-actions">
                <input type="text" id="manualAddressInput" placeholder="Adresler" readonly>
                <input type="text" id="manualHexInput" placeholder="Yeni Hex">
                <button class="action-btn change-btn" onclick="manuelAdresDegistir()">✏️ Değiştir</button>
                <button class="action-btn delete-btn" onclick="manuelAdresSil()">🗑️ Sıfırla</button>
                <button class="action-btn cut-btn" onclick="manuelAdresKes()">✂️ Kes</button>
            </div>
        </div>

        <div class="hex-viewer-container">
            <div id="hexPlaceholder" class="hex-empty-msg">Modlamak istediğiniz EW6 dosyasını seçin...</div>
            <div id="hexEditorGrid" class="hex-editor-grid" style="display: none;"></div>
        </div>
    </div>

    <div id="customAlertModal" class="custom-alert-overlay" style="display: none;">
        <div class="custom-alert-box">
            <div class="custom-alert-icon">⚠️</div>
            <h4 id="customAlertTitle">Bildirim</h4>
            <p id="customAlertMsg">-</p>
            <button class="custom-alert-btn" onclick="kapatCustomAlert()">Tamam, Kral</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
